<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3i-web · Presentation</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon-jupiter.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: Georgia, serif;
      color: rgba(214, 232, 255, 0.95);
      background:
        radial-gradient(circle at top, rgba(22, 58, 115, 0.38), transparent 34%),
        linear-gradient(180deg, #01040c 0%, #030916 100%);
      overflow: hidden;
    }

    #presentation-shell {
      position: relative;
      min-height: 100vh;
    }

    #presentation-stage {
      position: relative;
      min-height: 100vh;
      background: rgba(0, 8, 28, 0.84);
      overflow: hidden;
    }

    #presentation-frame {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      border: 0;
      display: none;
      background: transparent;
    }

    #presentation-stage.started #presentation-frame {
      display: block;
    }

    #presentation-play-flyover {
      position: fixed;
      inset: 0;
      z-index: 24;
      pointer-events: none;
      overflow: hidden;
      display: none;
    }

    #presentation-play-flyover.is-active {
      display: block;
    }

    #presentation-play-flyover-image {
      position: absolute;
      top: 30%;
      left: 0%;
      width: min(220px, 18vw);
      max-width: 280px;
      height: auto;
      opacity: 0;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.42));
    }

    #presentation-play-flyover.is-active #presentation-play-flyover-image {
      animation: presentation-play-flyover 115200ms linear forwards;
    }

    @keyframes presentation-play-flyover {
      0% {
        top: 30%;
        left: 0%;
        opacity: 0.98;
        transform: translate(-50%, -50%) scale(1);
      }

      100% {
        top: 70%;
        left: 100%;
        opacity: 0.98;
        transform: translate(-50%, -50%) scale(3);
      }
    }

    #presentation-message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    #presentation-stage.started #presentation-message {
      display: none;
    }

    .presentation-card {
      width: min(680px, 100%);
      padding: 30px 32px;
      border-radius: 22px;
      border: 1px solid rgba(120, 170, 255, 0.2);
      background: rgba(5, 17, 44, 0.72);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.28);
    }

    .presentation-card h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 3.4vw, 44px);
      color: rgba(231, 241, 255, 0.97);
    }

    .presentation-card p {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
      color: rgba(185, 211, 250, 0.84);
    }

    .presentation-card p + p {
      margin-top: 12px;
    }

    #presentation-message {
      display: none;
    }

    #presentation-message.visible {
      display: flex;
    }

    #presentation-controls {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      pointer-events: none;
    }

    .presentation-control-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button,
    a.presentation-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.07);
      color: rgba(214, 232, 255, 0.95);
      font: inherit;
      font-size: 16px;
      letter-spacing: 0.8px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      pointer-events: auto;
      backdrop-filter: blur(8px);
    }

    button:hover,
    a.presentation-link:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.38);
    }

    button:disabled {
      opacity: 0.46;
      cursor: default;
    }

    @media (max-width: 720px) {
      #presentation-controls {
        align-items: stretch;
        flex-direction: column;
        left: 12px;
        right: 12px;
        bottom: 12px;
      }

      .presentation-control-group {
        width: 100%;
      }

      button,
      a.presentation-link {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main id="presentation-shell">
    <section id="presentation-stage" aria-live="polite">
      <iframe
        id="presentation-frame"
        title="Presentation slide"
        loading="eager"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen
        referrerpolicy="no-referrer"
      ></iframe>

      <div id="presentation-message" aria-hidden="true">
        <div class="presentation-card">
          <h1 id="presentation-message-title">Presentation unavailable</h1>
          <p id="presentation-message-copy">The presentation manifest could not be loaded.</p>
        </div>
      </div>
    </section>

    <div id="presentation-play-flyover" aria-hidden="true">
      <img id="presentation-play-flyover-image" src="assets/3igreen_1.png" alt="">
    </div>

    <section id="presentation-controls">
      <div class="presentation-control-group">
        <button id="presentation-back-btn" type="button" disabled>Back</button>
        <button id="presentation-next-btn" type="button" disabled>Next</button>
        <button id="presentation-pause-btn" type="button" disabled>Pause</button>
      </div>
      <div class="presentation-control-group">
        <a id="presentation-skip-link" class="presentation-link" href="trajectory_player?designation=3I&source=web">Skip to Player</a>
        <a id="presentation-home-link" class="presentation-link" href="index.html">Back to Index</a>
      </div>
    </section>
  </main>

  <script src="translations.js"></script>
  <script type="module" src="presentation.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity and Orbit</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, serif;
      color: rgba(230, 240, 255, 0.96);
      background:
        radial-gradient(circle at top, rgba(52, 101, 184, 0.22), transparent 36%),
        linear-gradient(180deg, #030817 0%, #061127 100%);
    }

    main {
      width: min(960px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 56px 0;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 4.8vw, 56px);
    }

    p,
    li {
      font-size: 20px;
      line-height: 1.75;
      color: rgba(194, 218, 250, 0.88);
    }

    ul {
      margin: 22px 0 0;
      padding-left: 26px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Gravity and Orbit</h1>
    <p>Gravity is the pull between masses. Orbit happens when an object keeps falling around a larger body instead of crashing straight into it.</p>
    <ul>
      <li>Planets orbit the Sun</li>
      <li>Moons orbit planets</li>
      <li>Spacecraft use the same basic idea</li>
    </ul>
  </main>
</body>
</html>

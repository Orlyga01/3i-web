<!DOCTYPE html>
<html lang="en" data-i18n-ready="false">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPHEREx</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, serif;
      color: rgba(230, 240, 255, 0.98);
      background:
        radial-gradient(circle at top, rgba(52, 101, 184, 0.18), transparent 34%),
        linear-gradient(180deg, #020612 0%, #061127 100%);
      overflow: hidden;
    }

    html[data-i18n-ready="false"] body {
      visibility: hidden;
    }

    main {
      width: min(1200px, calc(100vw - 48px));
      height: 100vh;
      margin: 0 auto;
      padding: clamp(20px, 3vh, 36px) 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(16px, 2.4vh, 28px);
      align-items: stretch;
    }

    header {
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 4.6vw, 58px);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin-top: 8px;
      font-size: clamp(21px, 2.3vw, 30px);
      color: rgba(194, 218, 250, 0.88);
    }

    .image-frame {
      min-height: 0;
      border: 1px solid rgba(120, 170, 255, 0.22);
      border-radius: 24px;
      background: rgba(6, 16, 40, 0.78);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(12px, 1.6vw, 20px);
    }

    .image-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
    }

    @media (max-width: 920px) {
      body {
        overflow: auto;
      }

      main {
        height: auto;
        min-height: 100vh;
      }

      .image-frame {
        min-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="slide-title">SPHEREx</h1>
      <div id="slide-subtitle" class="subtitle">NASA's all-sky infrared survey mission</div>
    </header>

    <section id="image-frame" class="image-frame" aria-label="SPHEREx mission image">
      <img id="slide-image" src="../../assets/spherex.webp" alt="SPHEREx mission artwork">
    </section>
  </main>
  <script src="../../translations.js"></script>
  <script>
    (async function applySpherexTranslations() {
      const AppTranslations = window.AppTranslations || {};
      const locale = AppTranslations.getLocaleFromSearch?.(window.location.search) || "en";
      AppTranslations.setDocumentLocale?.(locale);
      try {
        await AppTranslations.loadTranslations?.();

        const read = fallback => AppTranslations.translate?.(fallback, { locale, fallback }) || fallback;
        document.title = read("SPHEREx");
        const titleEl = document.getElementById("slide-title");
        const subtitleEl = document.getElementById("slide-subtitle");
        const frameEl = document.getElementById("image-frame");
        const imageEl = document.getElementById("slide-image");
        if (titleEl) titleEl.textContent = read("SPHEREx");
        if (subtitleEl) subtitleEl.textContent = read(subtitleEl.textContent);
        if (frameEl) frameEl.setAttribute("aria-label", read(frameEl.getAttribute("aria-label") || "SPHEREx mission image"));
        if (imageEl) imageEl.alt = read(imageEl.alt);
      } finally {
        document.documentElement.dataset.i18nReady = "true";
      }
    }());
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-i18n-ready="false">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avi Loeb Transition</title>
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="preconnect" href="https://upload.wikimedia.org">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    body {
      font-family: Georgia, serif;
      color: #fff;
    }

    html[data-i18n-ready="false"] body {
      visibility: hidden;
    }

    .slide-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .panel {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 700ms ease;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel img {
      height: 100%;
      width: auto;
      max-width: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    .slide-shell.show-first .first-image-panel,
    .slide-shell.show-second .second-image-panel {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main id="slide-shell" class="slide-shell show-first" aria-label="Avi Loeb transition slide">
    <section class="panel first-image-panel" aria-hidden="false">
      <img
        id="first-image"
        src="https://i.ytimg.com/vi/bzKuFqxJot8/maxresdefault.jpg"
        alt="Video thumbnail"
      >
    </section>
    <section class="panel second-image-panel" aria-hidden="true">
      <img
        id="second-image"
        src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Avi_Loeb_in_2023_02.jpg"
        alt="Avi Loeb in 2023"
      >
    </section>
  </main>

  <script src="../../translations.js"></script>
  <script>
    (async function bootstrapAviLoebTransitionSlide() {
      const AppTranslations = window.AppTranslations || {};
      const locale = AppTranslations.getLocaleFromSearch?.(window.location.search) || "en";
      AppTranslations.setDocumentLocale?.(locale);

      const slideShell = document.getElementById("slide-shell");
      const firstPanel = document.querySelector(".first-image-panel");
      const secondPanel = document.querySelector(".second-image-panel");
      const firstImage = document.getElementById("first-image");
      const secondImage = document.getElementById("second-image");
      const read = fallback => AppTranslations.translate?.(fallback, { locale, fallback }) || fallback;

      function showSecondImage() {
        if (!slideShell) return;
        slideShell.classList.remove("show-first");
        slideShell.classList.add("show-second");
        if (firstPanel) firstPanel.setAttribute("aria-hidden", "true");
        if (secondPanel) secondPanel.setAttribute("aria-hidden", "false");
      }

      try {
        await AppTranslations.loadTranslations?.();
        document.title = read("Avi Loeb Transition");
        if (slideShell) {
          slideShell.setAttribute("aria-label", read("Avi Loeb transition slide"));
        }
        if (firstImage) {
          firstImage.alt = read("Video thumbnail");
        }
        if (secondImage) {
          secondImage.alt = read("Avi Loeb in 2023");
        }
      } catch (error) {
        // Keep the slide functional even if translations fail to load.
      } finally {
        document.documentElement.dataset.i18nReady = "true";
      }

      window.setTimeout(showSecondImage, 2000);
    }());
  </script>
</body>
</html>

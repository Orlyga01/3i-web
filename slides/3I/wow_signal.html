<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wow! Signal</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, serif;
      color: rgba(230, 240, 255, 0.96);
      background:
        radial-gradient(circle at top, rgba(52, 101, 184, 0.22), transparent 36%),
        linear-gradient(180deg, #030817 0%, #061127 100%);
    }

    main {
      width: min(960px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 56px 0;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 4.8vw, 56px);
    }

    p,
    li {
      font-size: 20px;
      line-height: 1.75;
      color: rgba(194, 218, 250, 0.88);
    }

    ul {
      margin: 22px 0 0;
      padding-left: 26px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Wow! Signal</h1>
    <p>A strange radio signal was detected in 1977, and it was so surprising that astronomer Jerry Ehman wrote “Wow!” on the printout.</p>
    <ul>
      <li>Detected by Ohio State’s Big Ear telescope</li>
      <li>Lasted about 72 seconds</li>
      <li>Was never conclusively explained or repeated</li>
    </ul>
  </main>
</body>
</html>

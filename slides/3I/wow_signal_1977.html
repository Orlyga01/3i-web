<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wow! Signal - 12 Aug 1977</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, serif;
      color: rgba(230, 240, 255, 0.98);
      background:
        radial-gradient(circle at top, rgba(52, 101, 184, 0.18), transparent 34%),
        linear-gradient(180deg, #020612 0%, #061127 100%);
      overflow: hidden;
    }

    main {
      width: min(1200px, calc(100vw - 48px));
      height: 100vh;
      margin: 0 auto;
      padding: clamp(20px, 3vh, 36px) 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(16px, 2.4vh, 28px);
      align-items: stretch;
    }

    header {
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 4.6vw, 58px);
      letter-spacing: 0.02em;
    }

    .date {
      margin-top: 8px;
      font-size: clamp(18px, 2vw, 26px);
      color: rgba(194, 218, 250, 0.88);
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }

    .image-frame {
      min-height: 0;
      border: 1px solid rgba(120, 170, 255, 0.22);
      border-radius: 24px;
      background: rgba(6, 16, 40, 0.78);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(12px, 1.6vw, 20px);
    }

    .image-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
    }

    @media (max-width: 920px) {
      body {
        overflow: auto;
      }

      main {
        height: auto;
        min-height: 100vh;
      }

      .image-frame {
        min-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Wow! Signal</h1>
      <div class="date">12 Aug 1977</div>
    </header>

    <section class="image-frame" aria-label="Wow Signal printout image">
      <img src="https://bilimgenc.tubitak.gov.tr/sites/default/files/styles/bp-770px-custom_user_desktop_1x/public/wowcl.jpg?itok=Kf67AtyK" alt="Historic Wow Signal printout with the famous circled notation">
    </section>
  </main>
</body>
</html>

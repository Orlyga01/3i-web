<!DOCTYPE html>
<html lang="en" data-i18n-ready="false">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3I/ATLAS · Interstellar Visitor</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    (function redirectTopLevelSolarCometPage() {
      if (window.self !== window.top) return;
      const params = new URLSearchParams(window.location.search);
      const lang = params.get('lang') || 'en';
      const target = new URL('trajectory_player', window.location.href);
      target.searchParams.set('designation', 'solar_comet');
      target.searchParams.set('source', 'web');
      target.searchParams.set('lang', lang);
      window.location.replace(target.toString());
    })();
  </script>
  <style>
    html[data-i18n-ready="false"] body {
      visibility: hidden;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="sceneLabel">THE ECLIPTIC PLANE</div>
  <div id="subLabel">All planets share the same orbital plane</div>
  <div id="calendar"></div>
  <div id="ui">
    <div id="timelineContainer">
      <div id="timeIndicator"></div>
      <div id="timeline">
        <div id="timelineProgress"></div>
        <div id="timelineThumb"></div>
      </div>
    </div>
    <div id="controls">
      <button id="prevBtn">&#9664;</button>
      <button id="pauseBtn">&#9208; Pause</button>
      <button id="nextBtn">&#9654;</button>
    </div>
  </div>
  <script src="translations.js"></script>
  <script src="shared_render.js"></script>
  <script src="main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trajectory Player · 3I-web</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon-jupiter.svg">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="anomalies_panel.css">
  <link rel="stylesheet" href="more_info_modal.css">
  <style>
    #c {
      position: fixed;
      inset: 0;
      z-index: 0;
      cursor: grab;
    }

    #tp-back-link {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 20;
      font-size: 12px;
      letter-spacing: 1.5px;
      color: rgba(160, 200, 255, 0.72);
      text-decoration: none;
      transition: color .2s;
    }

    #tp-back-link:hover {
      color: rgba(205, 230, 255, 0.95);
    }

    #tp-anomalies-panel {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 60;
      pointer-events: none;
    }

    #tp-anomalies-panel .anp-panel {
      z-index: 60;
    }

    #tp-anomalies-panel .anp-panel.is-collapsed {
      transform: translateX(-100%);
    }

    #tp-anomalies-panel .anp-tab {
      position: absolute;
      top: 50%;
      right: -34px;
      width: 34px;
      transform: translateY(-50%);
      min-height: 110px;
      padding: 8px 6px;
      z-index: 61;
      background: rgba(20, 48, 96, 0.98);
      border: 1px solid rgba(150, 205, 255, 0.55);
      border-left: none;
      box-shadow: 0 0 18px rgba(90, 170, 255, 0.45);
      pointer-events: auto;
    }

    #tp-anomalies-panel .anp-tab-title {
      font-size: 9px;
      letter-spacing: 1.4px;
      color: rgba(236, 245, 255, 0.98);
    }

    #tp-shell {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #tp-title-block {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }

    #tp-title {
      color: rgba(210, 230, 255, 0.95);
      font-size: 15px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(100, 180, 255, 0.8);
    }

    #tp-subtitle {
      margin-top: 9px;
      color: rgba(160, 200, 255, 0.66);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(100, 180, 255, 0.35);
    }

    .tp-card {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: min(560px, calc(100vw - 32px));
      padding: 18px 20px;
      border-radius: 14px;
      border: 1px solid rgba(100, 160, 255, 0.22);
      background: rgba(0, 8, 28, 0.82);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
      pointer-events: auto;
    }

    #tp-loading-card {
      top: 110px;
      text-align: center;
      color: rgba(180, 215, 255, 0.9);
      letter-spacing: 1px;
    }

    #tp-error-card {
      top: 110px;
      display: none;
      text-align: center;
      color: rgba(210, 225, 255, 0.92);
    }

    #tp-error-card.visible {
      display: block;
    }

    #tp-error-message {
      line-height: 1.55;
    }

    #tp-error-link {
      display: inline-block;
      margin-top: 14px;
      color: rgba(150, 210, 255, 0.92);
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 12px;
    }

    #tp-error-link:hover {
      color: rgba(210, 235, 255, 1);
    }

    #tp-stats {
      position: fixed;
      top: 0;
      left: 0;
      width: max-content;
      max-width: calc(100vw - 32px);
      padding: 5px 7px;
      box-sizing: border-box;
      border-radius: 7px;
      border: 1px solid rgba(130, 180, 255, 0.2);
      background: rgba(0, 1, 14, 0.75);
      color: rgba(200, 230, 255, 0.92);
      display: none;
      pointer-events: none;
    }

    #tp-stats.visible {
      display: block;
    }

    #tp-stats-date {
      font-size: 12px;
      letter-spacing: 0.2px;
      line-height: 1.1;
      white-space: nowrap;
    }

    #tp-stats-distance {
      margin-top: 2px;
      font-size: 10px;
      color: rgba(170, 205, 255, 0.82);
      letter-spacing: 0.2px;
      line-height: 1.1;
      white-space: nowrap;
    }

    #tp-overlay {
      position: fixed;
      right: 20px;
      top: 20px;
      bottom: auto;
      display: none;
      pointer-events: none;
      z-index: 12;
    }

    #tp-overlay.visible {
      display: block;
    }

    #tp-overlay .tp-overlay-card {
      width: min(280px, calc(100vw - 32px));
      min-height: 20px;
      border-radius: 12px;
      border: 1px solid rgba(130, 180, 255, 0.3);
      background: rgba(0, 1, 14, 0.88);
      padding: 12px 12px 14px;
      color: rgba(180, 210, 255, 0.85);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.34);
      pointer-events: auto;
    }

    .tp-overlay-kicker {
      color: rgba(140, 196, 255, 0.72);
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }

    #tp-overlay.is-image-mode .tp-overlay-kicker {
      color: rgba(255, 210, 150, 0.82);
    }

    .tp-overlay-date {
      margin-top: 6px;
      color: rgba(200, 235, 255, 0.9);
      font: 600 18px Georgia, serif;
      letter-spacing: 0.5px;
    }

    .tp-overlay-media-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 220px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid rgba(130, 180, 255, 0.2);
      background: rgba(6, 18, 40, 0.92);
      overflow: hidden;
    }

    .tp-overlay-preview {
      width: 220px;
      height: 220px;
      display: block;
    }

    .tp-overlay-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: none;
    }

    .tp-overlay-no-image {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 220px;
      padding: 18px;
      color: rgba(170, 205, 255, 0.82);
      font: 12px Georgia, serif;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .tp-overlay-description {
      margin-top: 10px;
      color: rgba(180, 210, 255, 0.85);
      font: 12px Georgia, serif;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .tp-overlay-actions {
      display: none;
      margin-top: 10px;
      justify-content: flex-start;
    }

    .tp-overlay-actions.visible {
      display: flex;
    }

    .tp-more-info-btn {
      padding: 6px 12px;
      border-radius: 14px;
      font-size: 11px;
      letter-spacing: 1px;
      background: rgba(40, 100, 200, 0.18);
      border: 1px solid rgba(100, 170, 255, 0.34);
      color: rgba(180, 220, 255, 0.92);
    }

    .tp-more-info-btn:hover {
      background: rgba(40, 100, 200, 0.32);
      border-color: rgba(130, 190, 255, 0.46);
    }

    #tp-more-info-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0, 1, 15, 0.78);
      align-items: center;
      justify-content: center;
      padding: 22px;
      box-sizing: border-box;
      pointer-events: auto;
    }

    #tp-more-info-modal.visible {
      display: flex;
    }

    #tp-more-info-content {
      width: min(960px, 100%);
      max-height: min(88vh, 900px);
      display: flex;
      flex-direction: column;
      background: rgba(5, 12, 38, 0.98);
      border: 1px solid rgba(100, 160, 255, 0.28);
      border-radius: 16px;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }

    #tp-more-info-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(100, 160, 255, 0.14);
    }

    #tp-more-info-kicker {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(140, 196, 255, 0.72);
    }

    #tp-more-info-date {
      margin-top: 6px;
      color: rgba(215, 235, 255, 0.95);
      font: 600 22px Georgia, serif;
      letter-spacing: 0.4px;
    }

    #tp-more-info-close {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
    }

    #tp-more-info-body {
      overflow: auto;
      padding: 18px 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .tp-more-info-empty {
      color: rgba(175, 205, 245, 0.74);
      font: 14px Georgia, serif;
      line-height: 1.6;
    }

    .tp-more-info-section-title {
      margin-bottom: 10px;
      font-size: 11px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(145, 200, 255, 0.8);
    }

    .tp-more-info-text {
      color: rgba(205, 224, 255, 0.88);
      font: 15px Georgia, serif;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .tp-more-info-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .tp-more-info-image-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
    }

    .tp-more-info-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      border-radius: 10px;
      border: 1px solid rgba(130, 180, 255, 0.2);
      background: rgba(6, 18, 40, 0.92);
    }

    .tp-more-info-caption {
      color: rgba(175, 205, 245, 0.76);
      font-size: 12px;
      line-height: 1.4;
    }

    .tp-more-info-video-frame,
    .tp-more-info-page-frame {
      width: 100%;
      border: 1px solid rgba(130, 180, 255, 0.2);
      border-radius: 10px;
      background: rgba(6, 18, 40, 0.92);
    }

    .tp-more-info-video-frame {
      aspect-ratio: 16 / 9;
      min-height: 320px;
    }

    .tp-more-info-page-frame {
      min-height: min(62vh, 640px);
    }

    .tp-more-info-video {
      width: 100%;
      max-height: min(62vh, 520px);
      border-radius: 10px;
      background: rgba(6, 18, 40, 0.92);
    }

    .tp-more-info-link {
      color: rgba(160, 214, 255, 0.94);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .tp-more-info-link:hover {
      color: rgba(220, 235, 255, 1);
    }

    #tp-continue-btn {
      position: fixed;
      left: 50%;
      bottom: 102px;
      transform: translateX(-50%);
      display: none;
      padding: 12px 26px;
      font-size: 16px;
      letter-spacing: 1.2px;
      pointer-events: auto;
    }

    #tp-continue-btn.visible {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #tp-timeline-shell {
      position: fixed;
      left: 50%;
      bottom: 86px;
      transform: translateX(-50%);
      width: min(860px, calc(100vw - 40px));
      display: none;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      pointer-events: auto;
    }

    #tp-timeline-shell.visible {
      display: flex;
    }

    #tp-timeline {
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    #tp-timeline-progress {
      width: 0%;
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, rgba(74, 170, 255, 0.92), rgba(140, 210, 255, 0.92));
    }

    #tp-timeline-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(180, 220, 255, 0.95);
      border: 2px solid rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 12px rgba(100, 180, 255, 0.8);
    }

    #tp-controls {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(860px, calc(100vw - 40px));
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 18px;
      border: 1px solid rgba(100, 160, 255, 0.22);
      background: rgba(0, 8, 28, 0.78);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.26);
      pointer-events: auto;
    }

    #tp-controls.visible {
      display: flex;
    }

    #tp-controls-left,
    #tp-controls-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tp-icon-btn {
      min-width: 48px;
      padding: 8px 14px;
    }

    .tp-icon-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #tp-play-btn {
      min-width: 64px;
    }

    #tp-speed-wrap,
    #tp-stop-wrap,
    #tp-stop-all-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(180, 215, 255, 0.86);
      font-size: 12px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    #ss-hud-panel {
      display: none !important;
    }

    #tp-speed-slider {
      width: 140px;
    }

    #tp-status-pill {
      color: rgba(150, 205, 255, 0.82);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      #tp-controls {
        flex-direction: column;
        align-items: stretch;
      }

      #tp-controls-left,
      #tp-controls-right {
        justify-content: center;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="tp-anomalies-panel"></div>

  <a id="tp-back-link" href="object_motion?designation=3I">← Back to Object Motion Tracker</a>

  <div id="tp-shell">
    <div id="tp-title-block">
      <div id="tp-title">Trajectory Player</div>
      <div id="tp-subtitle">Waiting for trajectory</div>
    </div>

    <div id="tp-loading-card" class="tp-card">Loading trajectory…</div>

    <div id="tp-error-card" class="tp-card" role="alert" aria-live="polite">
      <div id="tp-error-message"></div>
      <a id="tp-error-link" href="object_motion?designation=3I">Open Object Motion Tracker</a>
    </div>

    <div id="tp-stats" aria-live="polite">
      <div id="tp-stats-date">--</div>
      <div id="tp-stats-distance">Sun: -- AU</div>
    </div>

    <div id="tp-overlay" aria-live="polite"></div>

    <div id="tp-more-info-modal" role="dialog" aria-modal="true" aria-label="Point more info"></div>

    <button id="tp-continue-btn" type="button">Continue →</button>

    <div id="tp-timeline-shell">
      <div id="tp-timeline">
        <div id="tp-timeline-progress"></div>
        <div id="tp-timeline-thumb"></div>
      </div>
    </div>

    <div id="tp-controls">
      <div id="tp-controls-left">
        <button id="tp-restart-btn" class="tp-icon-btn" type="button">⏮</button>
        <button id="tp-prev-btn" class="tp-icon-btn" type="button">⏪</button>
        <button id="tp-play-btn" class="tp-icon-btn" type="button">▶</button>
        <button id="tp-next-btn" class="tp-icon-btn" type="button">⏩</button>
      </div>

      <div id="tp-controls-right">
        <label id="tp-speed-wrap">
          <span>Speed:</span>
          <input id="tp-speed-slider" type="range" min="0" max="7" step="1" value="3">
          <span id="tp-speed-value">1×</span>
        </label>

        <label id="tp-stop-wrap">
          <input id="tp-stop-checkbox" type="checkbox" checked>
          <span>Pause at stoppable points</span>
        </label>

        <label id="tp-stop-all-wrap">
          <input id="tp-stop-all-checkbox" type="checkbox">
          <span>Pause at every point</span>
        </label>

        <span id="tp-status-pill">Idle</span>
        <button id="tp-fullscreen-btn" class="tp-icon-btn" type="button">⛶</button>
      </div>
    </div>
  </div>

  <script src="app_config.js"></script>
  <script src="app_config_shared.js"></script>
  <script src="anomalies_shared.js"></script>
  <script src="anomalies_panel.js"></script>
  <script src="more_info_shared.js"></script>
  <script src="more_info_modal.js"></script>
  <script src="shared_render.js"></script>
  <script src="solar_system.js"></script>
  <script src="trajectory_player.js"></script>
</body>
</html>
